name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mesa-magica/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./mesa-magica
        run: npm ci

      - name: Lint frontend
        working-directory: ./mesa-magica
        run: npm run lint

      - name: Test frontend
        working-directory: ./mesa-magica
        run: npm run test

      - name: Build frontend
        working-directory: ./mesa-magica
        run: npm run build

  backend-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Lint backend
        working-directory: ./backend
        run: npm run lint

      - name: Test backend
        working-directory: ./backend
        run: npm run test

      - name: Build backend
        working-directory: ./backend
        run: npm run build

  smoke-ci:
    runs-on: ubuntu-latest
    needs:
      - frontend-ci
      - backend-ci

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: restaurant_prueba_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d restaurant_prueba_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Backend smoke test
        shell: bash
        run: |
          set -euo pipefail
          npm --prefix backend ci
          npm --prefix backend run build

          PORT=3015 \
          DATABASE_HOST=127.0.0.1 \
          DATABASE_PORT=5432 \
          DATABASE_USERNAME=postgres \
          DATABASE_PASSWORD=postgres \
          DATABASE_NAME=restaurant_prueba_ci \
          DATABASE_SYNCHRONIZE=false \
          DATABASE_MIGRATIONS_RUN=true \
          DATABASE_SSL=false \
          JWT_SECRET=ci-smoke-secret \
          ALLOW_PUBLIC_BOOTSTRAP=true \
          node backend/dist/src/main.js > backend-smoke.log 2>&1 &

          BACKEND_PID=$!
          trap "kill ${BACKEND_PID} || true" EXIT

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3015/ >/dev/null; then
              break
            fi
            sleep 2
          done

          curl -fsS http://127.0.0.1:3015/ >/dev/null

      - name: Frontend smoke test
        shell: bash
        run: |
          set -euo pipefail
          npm --prefix mesa-magica ci
          npm --prefix mesa-magica run build
          npm --prefix mesa-magica run preview -- --host 127.0.0.1 --port 4173 > frontend-smoke.log 2>&1 &

          FRONTEND_PID=$!
          trap "kill ${FRONTEND_PID} || true" EXIT

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:4173/ >/dev/null; then
              break
            fi
            sleep 2
          done

          curl -fsS http://127.0.0.1:4173/ >/dev/null

  security-ci:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4
