name: Deploy to DigitalOcean Droplet

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE_NAME: mesa-magica-frontend
  BACKEND_IMAGE_NAME: mesa-magica-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase owner
        id: vars
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Set image tags
        id: meta
        run: |
          echo "frontend_image=${{ env.REGISTRY }}/${{ steps.vars.outputs.owner_lc }}/${{ env.FRONTEND_IMAGE_NAME }}" >> $GITHUB_OUTPUT
          echo "backend_image=${{ env.REGISTRY }}/${{ steps.vars.outputs.owner_lc }}/${{ env.BACKEND_IMAGE_NAME }}" >> $GITHUB_OUTPUT
          echo "sha_tag=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./mesa-magica
          file: ./mesa-magica/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: |
            ${{ steps.meta.outputs.frontend_image }}:latest
            ${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}:latest
            ${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy production compose to Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_PORT || 22 }}
          source: "deploy/docker-compose.prod.yml"
          target: "/opt/mesa-magica"

      - name: Deploy on Droplet
        uses: appleboy/ssh-action@v1.2.0
        env:
          FRONTEND_IMAGE: ${{ steps.meta.outputs.frontend_image }}
          BACKEND_IMAGE: ${{ steps.meta.outputs.backend_image }}
          IMAGE_TAG: ${{ steps.meta.outputs.sha_tag }}
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
          API_DOMAIN: ${{ secrets.API_DOMAIN }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
          DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_SSL: ${{ secrets.DATABASE_SSL }}
          DATABASE_SSL_REJECT_UNAUTHORIZED: ${{ secrets.DATABASE_SSL_REJECT_UNAUTHORIZED }}
          DATABASE_SYNCHRONIZE: ${{ secrets.DATABASE_SYNCHRONIZE }}
          DATABASE_MIGRATIONS_RUN: ${{ secrets.DATABASE_MIGRATIONS_RUN }}
          FRONTEND_PUBLIC_URL: ${{ secrets.FRONTEND_PUBLIC_URL }}
          CORS_EXTRA_ORIGINS: ${{ secrets.CORS_EXTRA_ORIGINS }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_ACCESS_TTL: ${{ secrets.JWT_ACCESS_TTL }}
          JWT_REFRESH_TTL: ${{ secrets.JWT_REFRESH_TTL }}
          ALLOW_PUBLIC_BOOTSTRAP: ${{ secrets.ALLOW_PUBLIC_BOOTSTRAP }}
          FISCALIZATION_ENABLED: ${{ secrets.FISCALIZATION_ENABLED }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_PORT || 22 }}
          envs: FRONTEND_IMAGE,BACKEND_IMAGE,IMAGE_TAG,APP_DOMAIN,API_DOMAIN,DATABASE_HOST,DATABASE_PORT,DATABASE_USERNAME,DATABASE_PASSWORD,DATABASE_NAME,DATABASE_SSL,DATABASE_SSL_REJECT_UNAUTHORIZED,DATABASE_SYNCHRONIZE,DATABASE_MIGRATIONS_RUN,FRONTEND_PUBLIC_URL,CORS_EXTRA_ORIGINS,JWT_SECRET,JWT_ACCESS_TTL,JWT_REFRESH_TTL,ALLOW_PUBLIC_BOOTSTRAP,FISCALIZATION_ENABLED,SENDGRID_API_KEY,GHCR_USERNAME,GHCR_READ_TOKEN
          script: |
            set -e

            mkdir -p /opt/mesa-magica
            cd /opt/mesa-magica

            : "${GHCR_USERNAME:=${{ steps.vars.outputs.owner_lc }}}"

            cat > .env <<EOF
            FRONTEND_IMAGE=${FRONTEND_IMAGE}
            BACKEND_IMAGE=${BACKEND_IMAGE}
            IMAGE_TAG=${IMAGE_TAG}
            APP_DOMAIN=${APP_DOMAIN}
            API_DOMAIN=${API_DOMAIN}
            DATABASE_HOST=${DATABASE_HOST}
            DATABASE_PORT=${DATABASE_PORT:-5432}
            DATABASE_USERNAME=${DATABASE_USERNAME}
            DATABASE_PASSWORD=${DATABASE_PASSWORD}
            DATABASE_NAME=${DATABASE_NAME}
            DATABASE_SSL=${DATABASE_SSL:-true}
            DATABASE_SSL_REJECT_UNAUTHORIZED=${DATABASE_SSL_REJECT_UNAUTHORIZED:-false}
            DATABASE_SYNCHRONIZE=${DATABASE_SYNCHRONIZE:-false}
            DATABASE_MIGRATIONS_RUN=${DATABASE_MIGRATIONS_RUN:-true}
            FRONTEND_PUBLIC_URL=${FRONTEND_PUBLIC_URL}
            CORS_EXTRA_ORIGINS=${CORS_EXTRA_ORIGINS}
            JWT_SECRET=${JWT_SECRET}
            JWT_ACCESS_TTL=${JWT_ACCESS_TTL:-1h}
            JWT_REFRESH_TTL=${JWT_REFRESH_TTL:-7d}
            ALLOW_PUBLIC_BOOTSTRAP=${ALLOW_PUBLIC_BOOTSTRAP:-false}
            FISCALIZATION_ENABLED=${FISCALIZATION_ENABLED:-false}
            SENDGRID_API_KEY=${SENDGRID_API_KEY}
            EOF

            echo "${GHCR_READ_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

            docker compose -f deploy/docker-compose.prod.yml --env-file .env pull
            docker compose -f deploy/docker-compose.prod.yml --env-file .env up -d --remove-orphans

            curl -fsS --retry 12 --retry-delay 5 --retry-connrefused http://127.0.0.1:8081/ >/dev/null
            curl -fsS --retry 12 --retry-delay 5 --retry-connrefused http://127.0.0.1:3015/ >/dev/null

            docker image prune -f || true
