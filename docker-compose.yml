version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: restaurant-menu-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: calendar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456789
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d calendar"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: node:20-alpine
    container_name: restaurant-menu-backend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3015
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: 123456789
      DATABASE_NAME: calendar
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: sh -c "npm install && npm run start:dev -- --poll"
    ports:
      - "3015:3015"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  frontend:
    image: node:20-alpine
    container_name: restaurant-menu-frontend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - backend
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      VITE_API_URL: http://localhost:3015
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 8080"
    ports:
      - "8080:8080"
    volumes:
      - ./mesa-magica:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
